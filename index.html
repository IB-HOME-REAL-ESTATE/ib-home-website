<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IB Home Real Estate</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">

<div class="logo">
🏠 IB Home Real Estate
</div>

<nav>
<a href="index.html">Home</a>
<a href="#">Buy</a>
<a href="#">Rent</a>
<a href="#">Commercial</a>
<a href="admin.html">Admin</a>
</nav>

</header>

<section class="hero">

<h1>Find Your Dream Property</h1>

<p>Buy, Sell & Rent Properties Across Pakistan</p>

<input type="text" id="searchInput" placeholder="Search by Location">

<button id="searchBtn">Search</button>

</section>

<section class="properties">

<h2>Latest Properties</h2>

<div id="property-list">

</div>

</section>

<footer>

<h2>IB Home Real Estate</h2>

<p>📍 Lahore, Pakistan</p>

<p>📞 0322-4313616</p>

</footer>
<script type="module">
import { db } from "./firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const propertyList = document.getElementById("property-list");

async function loadProperties() {
    propertyList.innerHTML = "";

    const snapshot = await getDocs(collection(db, "properties"));

    snapshot.forEach((doc) => {
        const data = doc.data();

        propertyList.innerHTML += `
<div class="card">
<img src="${data.image}" alt="Property Image">

<h3>${data.title}</h3>

<p>📍 ${data.location}</p>

<h4>PKR ${data.price}</h4>

<a href="property.html">View Details</a>

<button onclick="deleteProperty('${doc.id}')">
🗑 Delete
</button>

</div>
`;
    });
}

loadProperties();
</script>

<script src="script.js"></script>
<script type="module" src="firebase.js"></script>

</body>
</html>
