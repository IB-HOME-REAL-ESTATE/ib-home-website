<!DOCTYPE html>
<html>
<head>
    <title>IB Home Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            font-family: Arial;
            padding:20px;
            background:#f5f5f5;
        }
        h2{
            text-align:center;
        }
        input, textarea{
            width:100%;
            padding:12px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }
        button{
            width:100%;
            padding:12px;
            background:#0066cc;
            color:white;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<h2>IB Home Add Property</h2>

<input type="text" placeholder="Property Title">
<input type="number" placeholder="Price">
<input type="text" placeholder="Location">
<input type="text" placeholder="Area (Marla)">
<input type="number" placeholder="Bedrooms">
<input type="number" placeholder="Bathrooms">
<input type="text" placeholder="Image URL">
<textarea placeholder="Description"></textarea>

<button id="addPropertyBtn">Add Property</button>

<script type="module">
import { db } from "./firebase.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

document.getElementById("addPropertyBtn").addEventListener("click", async () => {

const inputs = document.querySelectorAll("input");
const textarea = document.querySelector("textarea");

try {

await addDoc(collection(db, "properties"), {
title: inputs[0].value,
price: inputs[1].value,
location: inputs[2].value,
area: inputs[3].value,
bedrooms: inputs[4].value,
bathrooms: inputs[5].value,
image: inputs[6].value,
description: textarea.value
});

alert("Property Added Successfully!");

} catch(error) {

alert(error.message);

}

});

</script>

</body>
</html>
