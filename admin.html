<!DOCTYPE html>
<html>
<head>
    <title>IB Home Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            font-family: Arial;
            padding:20px;
            background:#f5f5f5;
        }
        h2{
            text-align:center;
        }
        input, textarea{
            width:100%;
            padding:12px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }
        button{
            width:100%;
            padding:12px;
            background:#0066cc;
            color:white;
            border:none;
            border-radius:5px;
            font-size:18px;
        }
    </style>
</head>

<body>

<h2>IB Home Add Property</h2>

<input type="text" placeholder="Property Title">

<input type="number" placeholder="Price">

<input type="text" placeholder="Location">

<input type="text" placeholder="Area (Marla)">

<input type="number" placeholder="Bedrooms">

<input type="number" placeholder="Bathrooms">

<input type="text" placeholder="Image URL">

<textarea placeholder="Description"></textarea>

<button>Add Property</button>


</body>
</html>
