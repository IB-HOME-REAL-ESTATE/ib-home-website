<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IB Home Admin Panel</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<div class="logo">
🏠 IB Home Admin
</div>

<nav>

<a href="index.html">Home</a>

</nav>

</header>



<section class="admin-box">

<input type="text" placeholder="Description">

<input type="text" placeholder="Phone Number">
<h1>Add New Property</h1>


<input type="text" placeholder="Property Title">


<input type="text" placeholder="City / Location">


<input type="text" placeholder="Price">


<input type="text" placeholder="Area (Marla/Kanal)">


<input type="text" placeholder="Bedrooms">


<input type="text" placeholder="Bathrooms">



<select>

<option>House</option>

<option>Plot</option>

<option>Apartment</option>

<option>Commercial</option>

</select>



<input id="propertyImage" type="file" accept="image/*">



<button onclick="addProperty()">
Add Property
</button>



</section>



<footer>

<h2>IB Home Real Estate</h2>

</footer>



<script src="script.js"></script>


</body>

</html>
